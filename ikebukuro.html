<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>futae.net | 池袋二重整形AI診断</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Shippori+Mincho&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --rose-gold: #C19281;
            --bg: #f8f9fa;
            --accent: #d63031;
            --gold: #d4af37;
            --pink-bg: #fff5f5;
        }

        body {
            font-family: "Noto Sans JP", sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 0;
            line-height: 1.5;
            color: #333;
            overflow-x: hidden;
        }

        /* --- ヘッダー --- */
        header {
            background: #fff;
            height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 15px;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid #eee;
        }

        .header-main {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .header-logo {
            height: 42px;
            cursor: pointer;
        }

        .menu-trigger {
            font-size: 32px;
            cursor: pointer;
            color: var(--rose-gold);
            width: 65px;
        }

        .header-panda {
            font-size: 32px;
        }

        .header-update-mini {
            font-size: 8px;
            color: #bbb;
            margin-bottom: -4px;
            font-weight: bold;
        }

        .area-subtitle {
            text-align: right;
            font-family: 'Shippori Mincho', serif;
            font-size: 11px;
            color: #999;
            margin-top: 2px;
        }

        /* --- サイドメニュー --- */
        #side-menu {
            position: fixed;
            top: 0;
            left: -300px;
            width: 300px;
            height: 100%;
            background: white;
            z-index: 5000;
            transition: 0.4s;
            box-shadow: 5px 0 15px rgba(0, 0, 0, 0.1);
            overflow-y: auto;
        }

        #side-menu.open {
            left: 0;
        }

        #menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 4500;
            display: none;
        }

        .menu-header {
            padding: 40px 20px;
            background: var(--rose-gold);
            color: white;
            text-align: center;
            font-weight: bold;
            font-size: 1.4em;
        }

        .menu-item {
            padding: 18px 20px;
            border-bottom: 1px solid #eee;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.95em;
            color: #444;
        }

        .menu-sub-title {
            background: #f9f9f9;
            padding: 10px 20px;
            font-size: 0.75em;
            color: #999;
            font-weight: bold;
        }

        /* --- メインレイアウト --- */
        main {
            padding: 10px;
            max-width: 550px;
            margin: 0 auto;
        }

        .sort-container {
            background: #fff;
            padding: 10px 5px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            position: sticky;
            top: 100px;
            z-index: 900;
            border-bottom: 1px solid #eee;
        }

        .sort-btn {
            flex: 0 0 auto;
            background: #fff;
            border: 1px solid #eee;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 0.75em;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
        }

        .sort-btn.active {
            background: var(--rose-gold);
            color: white;
            border-color: var(--rose-gold);
        }

        /* --- カード装飾（ゴージャス） --- */
        .card {
            background: #fff;
            border-radius: 12px;
            margin-bottom: 15px;
            position: relative;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            cursor: pointer;
            border: 1px solid #eee;
        }

        .card-rank1 {
            border: 3px solid transparent;
            background-image: linear-gradient(#fff, #fff), linear-gradient(45deg, var(--gold), #fff, var(--gold));
            background-origin: border-box;
            background-clip: content-box, border-box;
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.4);
        }

        .card-rank10 {
            border: 2.5px solid transparent;
            background-image: linear-gradient(#fff, #fff), linear-gradient(45deg, var(--rose-gold), #fff, var(--rose-gold));
            background-origin: border-box;
            background-clip: content-box, border-box;
            box-shadow: 0 5px 15px rgba(193, 146, 129, 0.3);
        }

        .rank-badge {
            position: absolute;
            top: 0;
            left: 0;
            background: var(--rose-gold);
            color: #fff;
            padding: 4px 15px;
            font-size: 0.78em;
            font-weight: bold;
            border-radius: 0 0 12px 0;
            z-index: 10;
        }

        .badge-gold {
            background: var(--gold);
        }

        .img-container {
            height: 180px;
            background: #eee;
            overflow: hidden;
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-body {
            padding: 12px;
        }

        .clinic-name {
            font-weight: bold;
            font-size: 1.05em;
            margin-bottom: 6px;
            color: #000;
            min-height: 2.8em;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
        }

        .price-actual {
            font-size: 1.22em;
            color: var(--accent);
            font-weight: 900;
        }

        .stat-score {
            font-size: 0.95em;
            color: var(--rose-gold);
            font-weight: bold;
        }

        /* --- モーダル --- */
        #detail-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            z-index: 6000;
            display: none;
            overflow-y: auto;
        }

        .modal-header {
            position: sticky;
            top: 0;
            padding: 10px;
            display: flex;
            justify-content: flex-end;
            z-index: 7000;
            background: rgba(255, 255, 255, 0.9);
        }

        .close-btn {
            background: #666;
            color: #fff;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .db-section {
            padding: 15px 20px;
            border-bottom: 6px solid #f5f5f5;
        }

        .db-label {
            font-size: 0.85em;
            color: var(--rose-gold);
            font-weight: bold;
            margin-bottom: 8px;
            display: block;
            border-left: 5px solid var(--rose-gold);
            padding-left: 10px;
        }

        .papa-box {
            background: var(--pink-bg);
            padding: 20px;
            border-radius: 15px;
            border: 2px dashed var(--rose-gold);
            font-size: 0.92em;
            line-height: 1.8;
        }

        /* --- お問い合わせ --- */
        #contact-section {
            background: #fff;
            padding: 40px 20px;
            border-top: 5px solid var(--rose-gold);
            margin-top: 30px;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            margin-bottom: 10px;
            font-size: 1em;
        }

        .btn-submit {
            width: 100%;
            background: var(--rose-gold);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
        }

        #thanks-msg {
            display: none;
            background: #e6fffa;
            color: #2c7a7b;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 20px;
            border: 2px solid #38b2ac;
        }

        footer {
            background: #444;
            color: #fff;
            padding: 30px 15px;
            text-align: center;
            font-size: 0.75em;
        }

        .manga-img {
            max-width: 100%;
            border-radius: 10px;
            margin-bottom: 15px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .knowledge-table {
            width: 100%;
            border-collapse: collapse;
            margin: 10px 0;
            font-size: 0.85em;
        }

        .knowledge-table th {
            background: var(--rose-gold);
            color: white;
            padding: 10px;
        }

        .knowledge-table td {
            border: 1px solid #eee;
            padding: 10px;
            text-align: center;
        }

        .highlight-box {
            background: #fff5f5;
            border: 1.5px solid var(--rose-gold);
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            font-size: 0.9em;
        }

        .quote-box {
            border-left: 4px solid var(--rose-gold);
            padding-left: 15px;
            font-style: italic;
            color: #555;
            margin: 15px 0;
        }

        #wisdom-bubble {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        #wisdom-bubble::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>

<body>
    <div id="menu-overlay" onclick="closeMenu()"></div>
    <nav id="side-menu">
        <div class="menu-header">futae.net</div>
        <div class="menu-item" onclick="location.href='index.html'">🏠 トップページ (エリア選択)</div>
        <div class="menu-item" onclick="openInfo('story')">🧭 Futae.netの正義 (マンガ)</div>
        <div class="menu-item" onclick="openInfo('money')">💰 知っておきたい「お金」のハナシ</div>
        <div class="menu-item" onclick="openInfo('knowledge')">💉 二重整形の基本知識</div>
        <div class="menu-item" onclick="openInfo('counseling')">🗣️ カウンセリングのコツ</div>
        <div class="menu-item" onclick="openInfo('logic')">🤖 AI判定の仕組み</div>
        <div class="menu-sub-title">エリア選択</div>
        <div class="menu-item" onclick="location.reload()">📍 池袋（公開中）</div>
    </nav>

    <header>
        <div class="header-main">
            <div class="menu-trigger" onclick="openMenu()">☰</div>
            <img src="futae_net_final_logo.png" alt="logo" class="header-logo" onclick="location.href='index.html'">
            <div class="header-right" onclick="togglePandaShow()">
                <div class="header-update-mini" id="header-date">03/03更新</div>
                <div class="header-panda">🐼</div>
            </div>
        </div>
        <div class="area-subtitle">池袋クリニック一覧</div>
    </header>

    <main id="main-content">
        <div id="thanks-msg">📮 お問い合わせありがとうございました！<br>内容を確認して、お返事するパン 🐼</div>
        <div id="loading-msg" style="text-align:center; padding-top:100px;">🐼 分析中だパン...</div>
        <div class="sort-container">
            <div class="sort-btn active" id="sort-ai" onclick="sort('ai')">🤖 AI判定順</div>
            <div class="sort-btn" id="sort-price" onclick="sort('price')">💰 コスパ順</div>
            <div class="sort-btn" id="sort-tech" onclick="sort('tech')">💉 技術力順</div>
            <div class="sort-btn" id="sort-review" onclick="sort('review')">👥 クチコミ数順</div>
        </div>
        <div id="rank-1-area"></div>
        <div id="rank-grid-area" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:15px;">
        </div>
        <div id="rank-10-area"></div>
        <div id="rank-list-area"></div>
    </main>

    <section id="contact-section">
        <div style="text-align:center; color:var(--rose-gold); font-weight:bold; margin-bottom:20px;">📮 お問い合わせ</div>
        <form action="https://formsubmit.co/info@futae.net" method="POST">
            <input type="hidden" name="_next" value="https://futae.net/ikebukuro.html#thanks">
            <input type="hidden" name="_captcha" value="false">
            <input type="text" name="name" class="form-control" placeholder="お名前（ニックネーム可）" required>
            <input type="email" name="email" class="form-control" placeholder="メールアドレス" required>
            <select name="type" class="form-control">
                <option>サイトの掲載内容に関するご質問</option>
                <option>クリニック情報の修正・掲載依頼</option>
                <option>広告・ビジネスに関するお問い合わせ</option>
                <option>不具合・表示エラーのご報告</option>
                <option>その他</option>
            </select>
            <textarea name="message" class="form-control" rows="5" placeholder="自由に入力してパン 🐼" required></textarea>
            <button type="submit" class="btn-submit">問い合わせを届けるパン 🐼</button>
        </form>
    </section>

    <div id="detail-modal">
        <div class="modal-header">
            <div class="close-btn" onclick="closeModal()">✕</div>
        </div>
        <div id="modal-body"></div>
    </div>

    <div id="floating-panda"
        style="position:fixed; bottom:20px; right:20px; z-index:4000; visibility:hidden; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform: translateY(0);"
        onclick="showNextWisdom(true)">
        <div id="wisdom-bubble"
            style="opacity:0; transition:opacity 0.4s ease; position:absolute; bottom:80px; right:0; width:220px; max-height:220px; overflow-y:auto; background:#fff; border:3px solid var(--rose-gold); padding:15px; border-radius:20px; font-size:0.85em; font-weight:bold; box-shadow: 0 4px 15px rgba(0,0,0,0.1); line-height:1.6;">
        </div>
        <div style="font-size: 70px; cursor:pointer; text-align:right;">🐼</div>
    </div>

    <footer>&copy; 2026 futae.net</footer>

    <script>
        const clinicCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQmTgCOB0gT-HGoZEIvTHCJyZsLd_t7thkzzhK1-ocKZQ-mhVCW96Qw_9nuQvQaxl_qrf0A2tRDbeIG/pub?gid=1894263336&single=true&output=csv';
        const wisdomCsvUrl = `https://docs.google.com/spreadsheets/d/e/2PACX-1vQmTgCOB0gT-HGoZEIvTHCJyZsLd_t7thkzzhK1-ocKZQ-mhVCW96Qw_9nuQvQaxl_qrf0A2tRDbeIG/pub?gid=139261368&single=true&output=csv`;

        let globalData = []; let wisdomData = [];

        function cleanNum(v) { return parseFloat(String(v || '0').replace(/[^\d.]/g, '')) || 0; }

        async function init() {
            if (window.location.hash === "#thanks") document.getElementById('thanks-msg').style.display = 'block';
            await loadClinics();
            await loadWisdom();
            document.getElementById('floating-panda').style.visibility = 'visible';
            const now = new Date();
            document.getElementById('header-date').innerText = (now.getMonth() + 1).toString().padStart(2, '0') + '/' + now.getDate().toString().padStart(2, '0') + "更新";
        }

        async function loadClinics() {
            try {
                const res = await fetch(clinicCsvUrl);
                if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
                const txt = await res.text();
                Papa.parse(txt, {
                    header: true, skipEmptyLines: true, complete: (r) => {
                        globalData = r.data.filter(c => String(c.status).toLowerCase() === 'active' && c['クリニック名']);
                        document.getElementById('loading-msg').style.display = 'none';
                        sort('ai');
                    },
                    error: (err) => {
                        console.error('CSV parse error:', err);
                        showLoadError('データの解析に失敗したパン……🐼 時間をおいて再度お試しください。');
                    }
                });
            } catch (e) {
                console.error('Fetch error:', e);
                showLoadError('データの読み込みに失敗したパン……🐼 ネットワーク接続を確認してください。');
            }
        }

        async function loadWisdom() {
            try {
                const res = await fetch(wisdomCsvUrl);
                if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
                const txt = await res.text();
                Papa.parse(txt, {
                    header: true, complete: (r) => {
                        wisdomData = r.data;
                        startAutoWisdom();
                    }
                });
            } catch (e) {
                console.warn('Wisdom data load failed:', e);
            }
        }

        function showLoadError(msg) {
            const el = document.getElementById('loading-msg');
            el.innerHTML = `⚠️ ${msg}<br><button onclick="location.reload()" style="margin-top:12px; padding:10px 24px; border:2px solid var(--rose-gold); background:#fff; color:var(--rose-gold); font-weight:bold; border-radius:20px; cursor:pointer; font-size:0.9em;">🔄 再読み込みするパン</button>`;
            el.style.display = 'block';
        }

        function sort(type) {
            document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('sort-' + type).classList.add('active');

            if (type === 'review') {
                showSpecialWisdom('クチコミ数だけで決めないパン、数が多いということは広告代もかなりかかっているパン', '⚠️ 警告');
            }

            globalData.sort((a, b) => {
                if (type === 'ai') return cleanNum(b.total_score) - cleanNum(a.total_score);
                if (type === 'price') return cleanNum(a.actual_price) - cleanNum(b.actual_price) || (cleanNum(b.total_score) - cleanNum(a.total_score));
                if (type === 'tech') return cleanNum(b.score_tech) - cleanNum(a.score_tech) || (cleanNum(b.total_score) - cleanNum(a.total_score));
                if (type === 'review') return cleanNum(b.review_total_count) - cleanNum(a.review_total_count) || (cleanNum(b.total_score) - cleanNum(a.total_score));
                return 0;
            });
            render();
        }

        function createCardHtml(item, rank, type) {
            const actP = cleanNum(item.actual_price).toLocaleString();
            const offP = cleanNum(item.official_price).toLocaleString();
            const score = cleanNum(item.total_score).toFixed(2);
            const cardClass = rank === 1 ? 'card-rank1' : (rank === 10 ? 'card-rank10' : '');
            const badgeClass = rank === 1 ? 'badge-gold' : '';

            if (type === 'list') {
                return `<div class="card" style="display:flex; align-items:center; padding:10px;" onclick="openModalByData('${item['クリニック名']}')"><div style="width:25px; font-weight:bold; color:var(--rose-gold);">${rank}</div><div style="flex:1; font-weight:bold; font-size:0.9em;">${item['クリニック名']}</div><div style="text-align:right;"><div class="price-actual" style="font-size:0.9em;">¥${actP}</div></div></div>`;
            }
            return `<div class="card ${cardClass}" onclick="openModalByData('${item['クリニック名']}')">
                <div class="rank-badge ${badgeClass}">RANK ${rank}</div>
                <div class="img-container"><img src="${item.photo_url || ''}"></div>
                <div class="card-body">
                    <div class="clinic-name">${item['クリニック名']}</div>
                    <div style="display:flex; justify-content:space-between; align-items:flex-end;">
                        <div>
                            <div style="font-size:0.65em; color:#999;">📢 広告最安: ${offP}円</div>
                            <div class="price-actual">💸 ${actP}円</div>
                        </div>
                        <div class="stat-score">AI判定 ${score}</div>
                    </div>
                </div>
            </div>`;
        }

        function render() {
            let r1 = '', rGrid = '', r10 = '', rList = '';
            globalData.forEach((item, i) => {
                const r = i + 1;
                if (r === 1) r1 = createCardHtml(item, r, 'full');
                else if (r <= 9) rGrid += createCardHtml(item, r, 'grid');
                else if (r === 10) r10 = createCardHtml(item, r, 'full');
                else rList += createCardHtml(item, r, 'list');
            });
            document.getElementById('rank-1-area').innerHTML = r1;
            document.getElementById('rank-grid-area').innerHTML = rGrid;
            document.getElementById('rank-10-area').innerHTML = r10;
            document.getElementById('rank-list-area').innerHTML = rList;
        }

        function openModalByData(name) {
            const item = globalData.find(d => d['クリニック名'] === name);
            const score = cleanNum(item.total_score).toFixed(2);
            const formatReviews = (str, color) => {
                if (!str) return "";
                return str.split('\n').filter(l => l.trim()).map(l => `<div class="review-item"><span style="color:${color}">●</span> ${l}</div>`).join('');
            };

            const modalBody = document.getElementById('modal-body');
            modalBody.innerHTML = `
                <div style="height:220px;"><img src="${item.photo_url}" style="width:100%; height:100%; object-fit:cover;"></div>
                <div class="db-section">
                    <h2 class="modal-title">${item['クリニック名']}</h2>
                    <div style="background:var(--pink-bg); padding:12px; border-radius:8px; text-align:center; margin-top:8px;">
                        <span style="font-size:0.8em; color:var(--rose-gold); font-weight:bold;">AI総合判定</span><br>
                        <span style="font-size:1.8em; font-weight:900; color:var(--rose-gold);">${score}</span>
                    </div>
                </div>
                <div class="db-section"><div class="intro-text">${item.summary_intro || ''}</div></div>
                <div class="db-section"><canvas id="radarChart" style="max-height:220px;"></canvas></div>
                <div class="db-section">
                    <span class="db-label">📋 詳細データ</span>
                    <table style="width:100%; font-size:0.9em; border-collapse:collapse; line-height:2.2;">
                        <tr style="border-bottom:1px solid #eee;"><td>📢 広告最安</td><td style="text-align:right;">¥${cleanNum(item.official_price).toLocaleString()}</td></tr>
                        <tr style="border-bottom:1px solid #eee; font-weight:bold;"><td>💸 実勢目安</td><td style="text-align:right; color:var(--accent);">¥${cleanNum(item.actual_price).toLocaleString()}</td></tr>
                        <tr style="border-bottom:1px solid #eee;"><td>⚖️ 価格ギャップ</td><td style="text-align:right;">¥${cleanNum(item.gap_score).toLocaleString()}</td></tr>
                        <tr><td>⏱ ダウンタイム</td><td style="text-align:right;">${item.downtime_info || '3〜7日'}</td></tr>
                    </table>
                </div>
                <div class="db-section" style="text-align:center;">
                    <a href="${item.official_url}" target="_blank" style="display:block; background:var(--rose-gold); color:#fff; padding:18px; border-radius:35px; text-decoration:none; font-weight:bold;">公式サイトをチェック</a>
                </div>
                <div class="db-section">
                    <span class="db-label">🧔 パパの本音</span>
                    <div class="papa-box">🧔 「${item.father_comment || ''}」</div>
                </div>
                <div class="db-section"><div class="intro-text" style="font-weight:bold; color:var(--rose-gold);">${item.review_summary || ''}</div></div>
                <div class="db-section">
                    <span class="db-label">👥 現場のリアル</span>
                    <div style="background:#f9f9f9; padding:15px; border-radius:10px; font-size:0.88em;">
                        <div style="font-weight:bold; color:#2ecc71; margin-bottom:5px;">[良い点]</div>
                        ${formatReviews(item.reviews_good, '#2ecc71')}
                        <div style="font-weight:bold; color:#e74c3c; margin-top:15px; margin-bottom:5px;">[気になる点]</div>
                        ${formatReviews(item.reviews_bad, '#e74c3c')}
                    </div>
                </div>
            `;

            document.getElementById('detail-modal').style.display = 'block';
            setTimeout(() => {
                new Chart(document.getElementById('radarChart'), {
                    type: 'radar',
                    data: {
                        labels: ['信頼', '安全', '技術', 'コスパ'],
                        datasets: [{ data: [cleanNum(item.score_trust), cleanNum(item.score_safety), cleanNum(item.score_tech), cleanNum(item.score_cost)], backgroundColor: 'rgba(193,146,129,0.2)', borderColor: 'var(--rose-gold)', borderWidth: 2 }]
                    },
                    options: { scales: { r: { min: 0, max: 5, ticks: { display: false } } }, plugins: { legend: { display: false } } }
                });
            }, 150);
        }

        function openInfo(t) {
            closeMenu();
            const b = document.getElementById('modal-body');
            b.innerHTML = '';
            if (t === 'story') {
                b.innerHTML = `<div class="manga-container" style="padding:20px 0;"><h2 style="color:var(--rose-gold);">🧭 Futae.netの正義</h2><img src="story1.jpg" class="manga-img"><img src="story2.jpg" class="manga-img"><img src="story3.jpg" class="manga-img"><img src="story4.jpg" class="manga-img"><div class="papa-box">「次女の二重への思いを大切に、それに向け頑張ったアルバイト代を正しいクリニックで使ってほしい」<br><br>父親のそんな思いからAIを味方にして作ったのが、この <strong>『Futae.net』</strong> です。このサイトは24時間AIを動かし続けるためのサーバー代として、一部アフィリエイトを利用しています。が、安心してください。それとこれとは別、このサイトの使命は忖度なしの順位をつけること。なけなしのアルバイト代でプチ整形にチャレンジしたいそんな君たちへ、自信をもってオススメします。「ここが良かった」や「こういう機能がほしい」、そんな要望があればぜひ問い合わせからお気軽にご連絡ください。</div></div>`;
            } else if (t === 'money') {
                b.innerHTML = `<div style="padding:40px 20px;"><h2 style="color:var(--rose-gold);">💰 知っておきたい「お金」のハナシ</h2><p style="font-weight:bold;">「風邪のときは安いのに、なんで整形は高いの？🤔」</p><p style="font-size:0.9em; line-height:1.7;">病院に行ってお会計をするとき、「風邪のときは1,500円くらいだったのに、二重整形はなんでこんなに高いの？同じお医者さんでしょ？」と不思議に思ったことはありませんか？実は、そこには日本の医療の「あるルール」が関係しているんだパン！🐼</p><div class="db-label">1. 美容整形は「自由診療」</div><p style="font-size:0.85em;">美容整形は「病気を治すこと」ではなく、「今よりもっと綺麗になること」が目的のため公的保険が使えず、全額自己負担。これを「自由診療」と呼ぶよ。</p><div class="db-label">2. クリニックが自由に値段を決められる！</div><p style="font-size:0.85em;">自由診療は文字通り「自由」。先生の技術料、場所代、広告費が乗ってくるから同じ術式でも大きな開きが出るんだね。</p><div class="papa-box">🧔「要はお買い物と同じなんだ。このことをしっかり頭に入れて、バイト代を出す価値があるかどうか選んでほしいパン！🐼」</div></div>`;
            } else if (t === 'knowledge') {
                b.innerHTML = `<div style="padding:40px 20px;"><h2 style="color:var(--rose-gold);">💉 二重整形の基本知識</h2><p style="font-weight:bold;">安いには理由がある、高いにも理由がある。まずは仕組みを知ろうパン！🐼</p><details open style="margin-bottom:15px;"><summary style="font-weight:bold; cursor:pointer; background:#eee; padding:10px; border-radius:5px;">1. 術式の違い：埋没法 vs 切開法</summary><table class="knowledge-table"><tr><th>項目</th><th>埋没法</th><th>切開法</th></tr><tr><td>方法</td><td>細い糸で留める</td><td>切ってラインを作る</td></tr><tr><td>特徴</td><td>腫れ少、修正可</td><td>半永久、厚いまぶた向</td></tr><tr><td>価格目安</td><td>3万〜15万円</td><td>20万〜40万円</td></tr></table></details><details style="margin-bottom:15px;"><summary style="font-weight:bold; cursor:pointer; background:#eee; padding:10px; border-radius:5px;">2. 「何点留め」って何？</summary><div style="padding:10px; font-size:0.9em;"><p><strong>1〜2点留め:</strong> まぶたが薄い人向け。2点が現代の標準だパン。</p><p><strong>3〜4点留め:</strong> まぶたが厚めの人向け。固定力が強いパン。</p><div class="highlight-box"><strong>💡 パンダの助言</strong>点数が多い＝良いとは限らない！まぶたへの負担（腫れ）も ভাসるから、最適な数を見極めるのがプロの技だパン。</div></div></details><details><summary style="font-weight:bold; cursor:pointer; background:#eee; padding:10px; border-radius:5px;">3. 料金のカラクリ：オプションに注意</summary><div style="padding:10px; font-size:0.9em;"><p>広告の「29,800円」には、麻酔や保証プランが含まれていないことが多いんだパン。</p><div class="highlight-box" style="border-color:var(--accent);"><strong>⚠️ ここに注目！</strong>「極細の針」や「特殊な糸」を勧められても、原価は数百円の差だということを肝に銘じるパン！</div></div></details></div>`;
            } else if (t === 'counseling') {
                b.innerHTML = `<div style="padding:40px 20px;"><h2 style="color:var(--rose-gold);">🗣️ カウンセリングのコツ</h2><p style="font-weight:bold;">先生の前で緊張しちゃダメ！お財布を守るためのチェックリストだパン 🐼</p><div class="db-label">1. 予算を超えた時の「断り文句」</div><div class="quote-box">「親と約束しているので、独断では決められません」<br>「一旦、一晩じっくり考えたいので、今日のところは失礼します」</div><div class="db-label">2. 理想の写真を3枚用意する</div><div class="highlight-box">なりたい目2枚、なりたくない目1枚。これを見せるだけで意思疎通が劇的にスムーズになるパン。</div></div>`;
            } else if (t === 'logic') {
                b.innerHTML = `<div style="padding:40px 20px;"><h2 style="color:var(--rose-gold);">🤖 AI判定の仕組み</h2><div style="background:#f5f5f5; padding:20px; border-radius:10px; font-weight:bold; text-align:center; margin-bottom:15px;">Score = (Trust×4 + Safety×3 + Tech×2 + Cost×1) / 10</div><p style="font-weight:bold; color:var(--rose-gold);">価格の透明性と技術力を最優先に評価しているパン！</p><p style="font-size:0.9em; line-height:1.7;">形成外科専門医、修正手術対応などの実績、広告価格と実勢価格のギャップ、Googleマップクチコミや美容系サイト、SNSの評判など1万件以上のデータを独自のアルゴリズムで算定しAIが出した数値だパン。</p><div class="highlight-box" style="font-size:0.85em;"><strong>【クリニック関係者の方へ】</strong>算定基準を変えることはありませんが、利用者への特典提供などあればご連絡くださいパン。</div></div>`;
            }
            document.getElementById('detail-modal').style.display = 'block';
        }

        function closeModal() { document.getElementById('detail-modal').style.display = 'none'; }
        function openMenu() { document.getElementById('side-menu').classList.add('open'); document.getElementById('menu-overlay').style.display = 'block'; }
        function closeMenu() { document.getElementById('side-menu').classList.remove('open'); document.getElementById('menu-overlay').style.display = 'none'; }
        function togglePandaShow() {
            const fp = document.getElementById('floating-panda');
            fp.style.transform = fp.style.transform === 'translateY(150%)' ? 'translateY(0)' : 'translateY(150%)';
        }

        let wisdomTimer = null;
        let fadeTimer = null;

        function startAutoWisdom() {
            if (wisdomTimer) clearTimeout(wisdomTimer);
            showNextWisdom();
        }

        function getWeightedRandomWisdom() {
            if (!wisdomData || !wisdomData.length) return null;
            let pool = [];
            let fallbackPool = [];
            wisdomData.forEach(item => {
                let p = parseInt(item.priority || item['優先度']);
                if (isNaN(p)) p = 3;
                let weight = p === 1 ? 5 : (p === 2 ? 3 : 1);
                for (let i = 0; i < weight; i++) pool.push(item);
                fallbackPool.push(item);
            });
            if (pool.length === 0) pool = fallbackPool;
            return pool[Math.floor(Math.random() * pool.length)];
        }

        function displayWisdom(keyword, answer, category) {
            const b = document.getElementById('wisdom-bubble');
            b.style.opacity = '0';
            if (fadeTimer) clearTimeout(fadeTimer);
            fadeTimer = setTimeout(() => {
                b.style.display = 'block';

                const qHtml = `<div style="font-weight:bold; color:var(--accent); margin-bottom:5px;">Q. ${keyword}</div>`;
                const aHtml = `<div style="font-weight:normal; color:#333;">A. ${answer}</div>`;
                b.innerHTML = qHtml + aHtml;

                const totalLen = (keyword + answer).length;
                b.style.fontSize = totalLen > 50 ? '0.75em' : '0.85em';

                if (category === "⚠️ 警告" || category === "警告") b.style.borderColor = "var(--accent)";
                else b.style.borderColor = "var(--rose-gold)";

                b.style.opacity = '1';
                b.scrollTop = 0;
            }, 400);
        }

        function showNextWisdom(manual = false) {
            if (manual && wisdomTimer) clearTimeout(wisdomTimer);
            const s = getWeightedRandomWisdom();
            if (s) {
                const keyword = s.Keyword || s['キーワード'] || s['keyword'] || 'パンダの知恵';
                const answer = s.Answer || s['アンサー'] || s.answer || '';
                displayWisdom(keyword, answer, s.Category);
            }
            wisdomTimer = setTimeout(showNextWisdom, 15000);
        }

        function showSpecialWisdom(text, category) {
            if (wisdomTimer) clearTimeout(wisdomTimer);
            displayWisdom("パンダからの警告", text, category);
            wisdomTimer = setTimeout(showNextWisdom, 15000);
        }

        init();
    </script>
</body>

</html>
