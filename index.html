<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>futae.net | 新宿二重整形AI診断 V23.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --rose-gold: #C19281; --bg: #f8f9fa; --accent: #d63031; --gold: #d4af37; }
        body { font-family: "Hiragino Sans", sans-serif; background: var(--bg); margin: 0; padding: 0; }
        
        /* 1位・グリッド・リストの出し分け */
        main { max-width: 500px; margin: 0 auto; padding: 10px; }
        
        /* 基本カード */
        .card { background: #fff; border-radius: 12px; margin-bottom: 12px; position: relative; box-shadow: 0 2px 8px rgba(0,0,0,0.05); overflow: hidden; cursor: pointer; }
        
        /* 1位：特大 */
        .card-rank1 { border: 3px solid var(--gold); }
        .card-rank1 .img-container { height: 200px; }

        /* 2-5位：グリッド用（JSで制御） */
        .rank-grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }

        /* 6位以降：コンパクトリスト */
        .card-compact { display: flex; align-items: center; padding: 10px; }
        .card-compact .compact-info { flex: 1; padding-left: 10px; }
        .card-compact .price-tag { font-size: 1em; margin: 0; }

        /* バッジの重なり修正 */
        .rank-badge { position: absolute; top: 0; left: 0; background: var(--rose-gold); color: #fff; padding: 4px 12px; font-size: 0.75em; font-weight: bold; border-radius: 0 0 10px 0; z-index: 10; }

        /* レーダーチャートのコンテナ */
        .chart-container { width: 100%; max-width: 300px; margin: 0 auto; }

        /* モーダル内の全データ表示用スタイル */
        .data-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85em; }
        .data-table th, .data-table td { border-bottom: 1px solid #eee; padding: 8px; text-align: left; }
        .data-table th { color: var(--rose-gold); width: 40%; }
        
        /* その他の既存スタイル継承 */
        header { background: #fff; height: 70px; display: flex; align-items: center; justify-content: center; border-bottom: 2px solid #eee; position: sticky; top: 0; z-index: 1000; }
        .header-logo { height: 50px; }
        footer { padding: 40px 20px; text-align: center; font-size: 0.8em; color: #888; }
    </style>
</head>
<body>

<header>
    <img src="futae_net_final_logo.png" alt="logo" class="header-logo">
</header>

<main id="main-content">
    <div id="rank-1-area"></div>
    <div id="rank-grid-area" class="rank-grid-container"></div>
    <div id="rank-list-area"></div>
</main>

<div id="detail-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#fff; z-index:9999; overflow-y:auto;">
    <div style="padding:20px; text-align:right;"><button onclick="closeModal()" style="font-size:24px; border:none; background:none;">✕</button></div>
    <div id="modal-body"></div>
</div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/1WE5TRSmMxPFM5q5LSWyvNC9S8glgBKfyofIK-ZDncsY/export?format=csv&gid=0';
    let clinics = [];

    async function loadData() {
        const response = await fetch(csvUrl);
        const csvText = await response.text();
        Papa.parse(csvText, {
            header: true,
            complete: function(results) {
                clinics = results.data.filter(c => String(c.status).toLowerCase().trim() === 'active');
                render();
            }
        });
    }

    function render() {
        let r1 = ''; let grid = ''; let list = '';
        clinics.sort((a,b) => b.total_score - a.total_score).forEach((c, i) => {
            const rank = i + 1;
            const score = parseFloat(c.total_score).toFixed(2);
            
            if (rank === 1) {
                r1 = `
                <div class="card card-rank1" onclick="openModal(${i})">
                    <div class="rank-badge">RANK ${rank}</div>
                    <div class="img-container"><img src="${c.photo_url}" style="width:100%"></div>
                    <div style="padding:15px;">
                        <div style="color:var(--rose-gold); font-weight:bold;">AI総合判定 ${score}</div>
                        <div style="font-size:1.2em; font-weight:bold;">${c.クリニック名}</div>
                        <div style="color:var(--accent); font-size:1.3em; font-weight:900;">${parseInt(c.actual_price).toLocaleString()}円</div>
                    </div>
                </div>`;
            } else if (rank <= 5) {
                grid += `
                <div class="card" onclick="openModal(${i})">
                    <div class="rank-badge">RANK ${rank}</div>
                    <div style="padding:35px 10px 10px 10px;">
                        <div style="font-size:0.85em; font-weight:bold; height:2.4em; overflow:hidden;">${c.クリニック名}</div>
                        <div style="color:var(--accent); font-weight:bold;">${parseInt(c.actual_price).toLocaleString()}円</div>
                    </div>
                </div>`;
            } else {
                list += `
                <div class="card card-compact" onclick="openModal(${i})">
                    <div style="font-weight:bold; color:var(--rose-gold); width:30px;">${rank}</div>
                    <div class="compact-info">
                        <div style="font-size:0.9em; font-weight:bold;">${c.クリニック名}</div>
                    </div>
                    <div style="color:var(--accent); font-weight:bold;">${parseInt(c.actual_price).toLocaleString()}円</div>
                </div>`;
            }
        });
        document.getElementById('rank-1-area').innerHTML = r1;
        document.getElementById('rank-grid-area').innerHTML = grid;
        document.getElementById('rank-list-area').innerHTML = list;
    }

    function openModal(i) {
        const c = clinics[i];
        document.getElementById('modal-body').innerHTML = `
            <div style="padding:20px;">
                <h2>${c.クリニック名}</h2>
                <div class="chart-container"><canvas id="radarChart"></canvas></div>
                <h3>🧔 お父さんのメモ</h3><p>${c.father_comment}</p>
                <table class="data-table">
                    <tr><th>公式価格</th><td>${c.official_price}</td></tr>
                    <tr><th>実売目安</th><td>${c.actual_price}</td></tr>
                    <tr><th>ダウンタイム</th><td>${c.downtime_info}</td></tr>
                    <tr><th>正直度（乖離）</th><td>${c.gap_score}</td></tr>
                </table>
            </div>
        `;
        document.getElementById('detail-modal').style.display = 'block';
        initChart(c);
    }

    function initChart(c) {
        const ctx = document.getElementById('radarChart').getContext('2d');
        new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['信頼性', '安全性', '技術力', 'コスパ'],
                datasets: [{
                    label: 'AI分析値',
                    data: [c.score_trust, c.score_safety, c.score_tech, c.score_cost],
                    backgroundColor: 'rgba(193, 146, 129, 0.2)',
                    borderColor: 'rgba(193, 146, 129, 1)',
                    borderWidth: 2
                }]
            },
            options: { scales: { r: { min: 0, max: 5 } } }
        });
    }

    function closeModal() { document.getElementById('detail-modal').style.display = 'none'; }
    loadData();
</script>
</body>
</html>
