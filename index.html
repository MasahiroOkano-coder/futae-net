<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>futae.net | 新宿二重整形AI診断 V23.5</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --rose-gold: #C19281; --bg: #f8f9fa; --accent: #d63031; --gold: #d4af37; --pink-bg: #fff5f5; }
        body { font-family: "Noto Sans JP", sans-serif; background: var(--bg); margin: 0; padding: 0; line-height: 1.5; color: #333; }
        
        /* --- Header --- */
        header { background: #fff; height: 90px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid #eee; }
        .header-logo { height: 50px; cursor: pointer; }
        .menu-trigger { font-size: 32px; cursor: pointer; color: var(--rose-gold); width: 60px; }
        .header-right { text-align: right; width: 60px; }
        .header-update-mini { font-size: 10px; color: #999; margin-bottom: -5px; }
        .header-panda { font-size: 28px; cursor: pointer; }

        /* --- Menu & Overlay --- */
        #side-menu { position: fixed; top: 0; left: -300px; width: 300px; height: 100%; background: white; z-index: 5000; transition: 0.4s; box-shadow: 5px 0 15px rgba(0,0,0,0.1); }
        #side-menu.open { left: 0; }
        #menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 4500; display: none; }
        .menu-item { padding: 20px; border-bottom: 1px solid #eee; font-weight: bold; cursor: pointer; }

        /* --- Sort --- */
        .sort-container { background: #fff; padding: 10px 5px; display: flex; gap: 8px; overflow-x: auto; position: sticky; top: 90px; z-index: 900; border-bottom: 1px solid #eee; }
        .sort-btn { flex: 0 0 auto; background: #fff; border: 2px solid #eee; padding: 8px 14px; border-radius: 20px; font-size: 0.75em; font-weight: bold; cursor: pointer; }
        .sort-btn.active { background: var(--rose-gold); color: white; border-color: var(--rose-gold); }

        /* --- Cards --- */
        main { padding: 10px; max-width: 500px; margin: 0 auto; }
        .card { background: #fff; border-radius: 12px; margin-bottom: 15px; position: relative; box-shadow: 0 2px 8px rgba(0,0,0,0.05); overflow: hidden; cursor: pointer; }
        .card-rank1 { border: 3px solid var(--gold); }
        .rank-grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .img-container { height: 180px; background: #eee; }
        .card-grid .img-container { height: 130px; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        .rank-badge { position: absolute; top: 0; left: 0; background: var(--rose-gold); color: #fff; padding: 3px 12px; font-size: 0.75em; font-weight: bold; border-radius: 0 0 10px 0; z-index: 10; }

        /* --- Info Display --- */
        .clinic-name { font-weight: bold; font-size: 1.05em; margin-bottom: 8px; color: #000; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; min-height: 2.8em; }
        .price-official { font-size: 0.75em; color: #999; text-decoration: none; display: block; margin-bottom: -2px; }
        .price-actual { font-size: 1.25em; color: var(--accent); font-weight: 900; }
        .score-row { font-size: 0.8em; color: var(--rose-gold); font-weight: bold; }
        .rev-count { font-size: 0.85em; color: #bbb; font-weight: normal; margin-left: 3px; }

        /* --- Rank 6+ Compact Layout --- */
        .card-compact { display: flex; align-items: center; padding: 12px 15px; }
        .compact-rank { width: 30px; font-weight: bold; color: var(--rose-gold); font-size: 1.1em; }
        .compact-info { flex: 1; padding: 0 10px; overflow: hidden; }
        .compact-name { font-size: 0.95em; font-weight: bold; line-height: 1.3; margin-bottom: 2px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .compact-right { text-align: right; min-width: 120px; }
        .compact-score-line { font-size: 0.7em; color: var(--rose-gold); font-weight: bold; margin-bottom: 2px; }

        /* --- Modal --- */
        #detail-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 6000; display: none; overflow-y: auto; }
        .modal-header { position: sticky; top: 0; padding: 15px; display: flex; justify-content: flex-end; z-index: 7000; background: #fff; }
        .close-btn { background: #666; color: #fff; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .db-section { padding: 20px; border-bottom: 8px solid #f5f5f5; }
        .db-label { font-size: 0.85em; color: var(--rose-gold); font-weight: bold; margin-bottom: 10px; display: block; border-left: 5px solid var(--rose-gold); padding-left: 10px; }
        .manga-img { width: 100%; height: auto; border-radius: 10px; margin-bottom: 10px; }

        /* --- Floating Panda --- */
        #floating-panda { position: fixed; bottom: -150px; right: 20px; z-index: 4000; transition: 0.5s; }
        #floating-panda.show { bottom: 20px; }
    </style>
</head>
<body>

    <div id="menu-overlay" onclick="closeMenu()"></div>
    <nav id="side-menu">
        <div style="padding:40px 20px; background:var(--rose-gold); color:#fff; font-weight:bold;">futae.net</div>
        <div class="menu-item" onclick="openInfo('story')">🧭 Futae.netの正義 (マンガ)</div>
        <div class="menu-item" onclick="openInfo('logic')">🤖 AI判定の仕組み</div>
    </nav>

    <header>
        <div class="menu-trigger" onclick="openMenu()">☰</div>
        <img src="futae_net_final_logo.png" alt="logo" class="header-logo" onclick="location.reload()">
        <div class="header-right" onclick="togglePandaShow()">
            <div class="header-update-mini">02/26更新</div>
            <div class="header-panda">🐼</div>
        </div>
    </header>

    <div class="sort-container">
        <div class="sort-btn active" id="sort-ai" onclick="sort('ai')">🤖 AI判定順</div>
        <div class="sort-btn" id="sort-price" onclick="sort('price')">💰 コスパ順</div>
        <div class="sort-btn" id="sort-tech" onclick="sort('tech')">💉 技術力順</div>
        <div class="sort-btn" id="sort-review" onclick="sort('review')">👥 クチコミ数順</div>
    </div>

    <main id="main-content">
        <div id="rank-1-area"></div>
        <div id="rank-grid-area" class="rank-grid-container"></div>
        <div id="rank-list-area"></div>
    </main>

    <div id="floating-panda">
        <div style="font-size: 80px; cursor:pointer;" onclick="alert('パンダだパン！')">🐼</div>
    </div>

    <div id="detail-modal">
        <div class="modal-header"><div class="close-btn" onclick="closeModal()">✕</div></div>
        <div id="modal-body"></div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/1WE5TRSmMxPFM5q5LSWyvNC9S8glgBKfyofIK-ZDncsY/export?format=csv&gid=0';
        let globalData = [];

        // 数値洗浄ロジックの強化
        function cleanNum(v) {
            if(!v) return 0;
            const n = parseFloat(String(v).replace(/[^\d.]/g, ''));
            return isNaN(n) ? 0 : n;
        }

        async function loadData() {
            const res = await fetch(csvUrl);
            const txt = await res.text();
            Papa.parse(txt, {
                header: true,
                complete: function(r) {
                    globalData = r.data.filter(c => String(c.status).toLowerCase().trim() === 'active');
                    sort('ai');
                    setTimeout(() => document.getElementById('floating-panda').classList.add('show'), 1500);
                }
            });
        }

        function sort(type) {
            document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('sort-'+type).classList.add('active');
            globalData.sort((a,b) => {
                if(type==='ai') return cleanNum(b.total_score) - cleanNum(a.total_score);
                if(type==='price') return cleanNum(a.actual_price) - cleanNum(b.actual_price);
                if(type==='tech') return cleanNum(b.score_tech) - cleanNum(a.score_tech);
                if(type==='review') return cleanNum(b.review_total_count) - cleanNum(a.review_total_count);
            });
            render();
        }

        function render() {
            let r1='', grid='', list='';
            globalData.forEach((c, i) => {
                const rank = i+1;
                const score = cleanNum(c.total_score).toFixed(2);
                const rCount = cleanNum(c.review_total_count).toLocaleString();
                const offPrice = cleanNum(c.official_price).toLocaleString();
                const actPrice = cleanNum(c.actual_price).toLocaleString();
                
                if(rank===1) {
                    r1 = `<div class="card card-rank1" onclick="openModal(${i})">
                        <div class="rank-badge">RANK 1</div>
                        <div class="img-container"><img src="${c.photo_url}"></div>
                        <div style="padding:15px;">
                            <div class="clinic-name">${c.クリニック名}</div>
                            <div style="display:flex; justify-content:space-between; align-items:flex-end;">
                                <div>
                                    <div class="price-official">📢 広告最安: ${offPrice}円</div>
                                    <div class="price-actual">💸 実勢目安: ${actPrice}円</div>
                                </div>
                                <div class="score-row">AI判定 ${score}<span class="rev-count">(${rCount}件)</span></div>
                            </div>
                        </div>
                    </div>`;
                } else if(rank<=5) {
                    grid += `<div class="card card-grid" onclick="openModal(${i})">
                        <div class="rank-badge">RANK ${rank}</div>
                        <div class="img-container"><img src="${c.photo_url}"></div>
                        <div style="padding:10px;">
                            <div class="clinic-name" style="font-size:0.9em; min-height:2.6em;">${c.クリニック名}</div>
                            <div class="price-official" style="font-size:0.65em;">📢 ${offPrice}円</div>
                            <div style="display:flex; justify-content:space-between; align-items:baseline;">
                                <div class="price-actual" style="font-size:1em;">💸 ${actPrice}円</div>
                                <div class="score-row" style="font-size:0.65em;">${score}</div>
                            </div>
                        </div>
                    </div>`;
                } else {
                    list += `<div class="card card-compact" onclick="openModal(${i})">
                        <div class="compact-rank">${rank}</div>
                        <div class="compact-info"><div class="compact-name">${c.クリニック名}</div></div>
                        <div class="compact-right">
                            <div class="compact-score-line">AI判定 ${score} (${rCount}件)</div>
                            <div class="price-actual" style="font-size:1em;">💸 ${actPrice}円</div>
                        </div>
                    </div>`;
                }
            });
            document.getElementById('rank-1-area').innerHTML = r1;
            document.getElementById('rank-grid-area').innerHTML = grid;
            document.getElementById('rank-list-area').innerHTML = list;
        }

        function openModal(i) {
            const c = globalData[i];
            const score = cleanNum(c.total_score).toFixed(2);
            document.getElementById('modal-body').innerHTML = `
                <div style="height:200px;"><img src="${c.photo_url}" style="width:100%; height:100%; object-fit:cover;"></div>
                <div class="db-section">
                    <h2 style="margin:0;">${c.クリニック名}</h2>
                    <p style="color:var(--rose-gold); font-weight:bold; font-size:1.3em;">AI判定 ${score} <span class="rev-count">(${cleanNum(c.review_total_count).toLocaleString()}件)</span></p>
                </div>
                <div class="db-section">
                    <span class="db-label">📊 AI分析チャート</span>
                    <div style="max-width:300px; margin:0 auto;"><canvas id="radarChart"></canvas></div>
                </div>
                <div class="db-section">
                    <span class="db-label">🧔 お父さんの本音</span>
                    <p style="font-size:0.95em;">${c.father_comment}</p>
                </div>
                <div class="db-section">
                    <span class="db-label">📋 詳細データ</span>
                    <table style="width:100%; font-size:0.9em;">
                        <tr><th style="text-align:left; color:var(--rose-gold);">📢 広告最安</th><td>¥${cleanNum(c.official_price).toLocaleString()}</td></tr>
                        <tr><th style="text-align:left; color:var(--rose-gold);">💸 実勢目安</th><td>¥${cleanNum(c.actual_price).toLocaleString()}</td></tr>
                        <tr><th style="text-align:left; color:var(--rose-gold);">⏱ ダウンタイム</th><td>${c.downtime_info}</td></tr>
                    </table>
                </div>
                <div style="padding:30px;"><a href="${c.official_url}" target="_blank" style="display:block; background:var(--rose-gold); color:#fff; text-align:center; padding:18px; border-radius:35px; text-decoration:none; font-weight:bold;">公式サイトをチェック</a></div>
            `;
            document.getElementById('detail-modal').style.display = 'block';
            setTimeout(() => initRadar(c), 100);
        }

        function initRadar(c) {
            new Chart(document.getElementById('radarChart'), {
                type: 'radar',
                data: {
                    labels: ['信頼性', '安全性', '技術力', 'コスパ'],
                    datasets: [{
                        data: [cleanNum(c.score_trust), cleanNum(c.score_safety), cleanNum(c.score_tech), cleanNum(c.score_cost)],
                        backgroundColor: 'rgba(193, 146, 129, 0.2)', borderColor: 'var(--rose-gold)', borderWidth: 2
                    }]
                },
                options: { scales: { r: { min:0, max:5, ticks:{display:false} } }, plugins: { legend: {display:false} } }
            });
        }

        function openInfo(t) {
            const b = document.getElementById('modal-body');
            closeMenu();
            if(t==='story') {
                b.innerHTML = `<div style="padding:20px; text-align:center;">
                    <h2 style="color:var(--rose-gold);">FUTAE.net 誕生秘話</h2>
                    <img src="story1.jpg" class="manga-img"><img src="story2.jpg" class="manga-img">
                    <img src="story3.jpg" class="manga-img"><img src="story4.jpg" class="manga-img">
                </div>`;
            } else if(t==='logic') {
                b.innerHTML = `<div style="padding:40px;">
                    <h2>🤖 AI判定アルゴリズム</h2>
                    <p style="background:#f5f5f5; padding:20px; border-radius:10px; font-family:monospace;">
                        Score = (Trust × 0.4) + (Safety × 0.3) + (Tech × 0.2) + (PriceGap × 0.1)
                    </p>
                    <p style="font-size:0.9em; margin-top:20px;">
                        Googleのクチコミ、医師の経歴、広告価格と実勢価格の乖離率を多角的に分析し、次女を安心して送り出せる院を算出しています。
                    </p>
                </div>`;
            }
            document.getElementById('detail-modal').style.display = 'block';
        }

        function togglePandaShow() { document.getElementById('floating-panda').classList.toggle('show'); }
        function openMenu() { document.getElementById('side-menu').classList.add('open'); document.getElementById('menu-overlay').style.display='block'; }
        function closeMenu() { document.getElementById('side-menu').classList.remove('open'); document.getElementById('menu-overlay').style.display='none'; }
        function closeModal() { document.getElementById('detail-modal').style.display = 'none'; }
        loadData();
    </script>
</body>
</html>
