<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUTAE.net | 忖度なしの二重整形AIランキング（新宿エリア）</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ff5a5f;
            --secondary-color: #007bff;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #333;
            --text-sub: #666;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        header {
            background: #fff;
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid var(--primary-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .update-info {
            font-size: 0.8rem;
            color: var(--text-sub);
            margin-top: 5px;
        }

        .analysis-tag {
            display: inline-block;
            background: #e9ecef;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: bold;
            color: var(--secondary-color);
        }

        .container {
            max-width: 600px;
            margin: 20px auto;
            padding: 0 15px;
        }

        /* Clinic Card Styling */
        .clinic-card {
            background: var(--card-bg);
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 25px;
            overflow: hidden;
            border: 1px solid #eee;
            position: relative;
        }

        .rank-badge {
            background: var(--primary-color);
            color: white;
            padding: 5px 15px;
            font-weight: bold;
            display: inline-block;
            border-bottom-right-radius: 15px;
        }

        .rank-diff {
            font-size: 0.85rem;
            margin-left: 8px;
        }
        .rank-up { color: #fff; font-weight: bold; }

        .clinic-content { padding: 20px; }

        .clinic-name {
            margin: 0 0 10px 0;
            font-size: 1.4rem;
            color: #000;
        }

        /* Score Design */
        .score-row {
            display: flex;
            align-items: baseline;
            margin-bottom: 15px;
            background: #fff0f0;
            padding: 10px;
            border-radius: 8px;
        }
        .score-label { font-size: 0.8rem; color: var(--primary-color); font-weight: bold; margin-right: 10px; }
        .score-value { font-size: 2rem; font-weight: bold; color: var(--primary-color); font-family: 'serif'; }

        /* Price Box */
        .price-box {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }
        .price-item { font-size: 0.85rem; }
        .price-val { font-weight: bold; font-size: 1.1rem; display: block; }

        /* Downtime Info */
        .downtime-box {
            background: #f0f8ff;
            border-left: 4px solid var(--secondary-color);
            padding: 12px;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }
        .downtime-title { font-weight: bold; color: var(--secondary-color); margin: 0 0 5px 0; }

        /* Father Comment */
        .father-comment {
            background: #fff9e6;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 1px dashed #ffd700;
        }
        .comment-label { font-weight: bold; color: #b8860b; font-size: 0.9rem; display: block; margin-bottom: 5px; }

        /* Panda Intro */
        .panda-box {
            display: flex;
            align-items: center;
            background: #f1f3f5;
            padding: 10px;
            border-radius: 30px;
        }
        .panda-box img { width: 40px; height: 40px; margin-right: 10px; }
        .panda-box p { margin: 0; font-size: 0.85rem; }

        /* Hidden clinics */
        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold; font-size: 1.5rem; color: var(--primary-color);">FUTAE.net</div>
    <div class="update-info">
        最終分析・データ更新日: <span>2026/02/26</span> 
        <span class="analysis-tag">🔍 AI自動分析済み</span>
    </div>
</header>

<div class="container" id="clinic-container">
    <p style="text-align: center;">データを解析中だパン...</p>
</div>



<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
<script>
    // CSVファイルのURL（パスを適宜変更してください）
    const csvUrl = 'shinjuku.csv'; 

    async function loadRankings() {
        try {
            const response = await fetch(csvUrl);
            const csvData = await response.text();
            
            Papa.parse(csvData, {
                header: true,
                dynamicTyping: true,
                complete: function(results) {
                    renderClinics(results.data);
                }
            });
        } catch (error) {
            console.error('Error loading CSV:', error);
            document.getElementById('clinic-container').innerHTML = 'データの読み込みに失敗したパン。GitHubにCSVを上げたか確認してほしいパン。';
        }
    }

    function renderClinics(data) {
        const container = document.getElementById('clinic-container');
        container.innerHTML = '';

        // 1. statusがactiveなものだけを抽出 & スコアでソート
        const activeClinics = data
            .filter(c => c.status === 'active' && c.クリニック名)
            .sort((a, b) => b.total_score - a.total_score);

        activeClinics.forEach((clinic, index) => {
            const rank = index + 1;
            
            // ランク変動の計算
            let rankDiffHtml = '';
            if (clinic.previous_rank) {
                const diff = clinic.previous_rank - rank;
                if (diff > 0) rankDiffHtml = `<span class="rank-up">▲${diff}</span>`;
                else if (diff < 0) rankDiffHtml = `<span class="rank-down">▼${Math.abs(diff)}</span>`;
            }

            const card = document.createElement('div');
            card.className = 'clinic-card';
            card.innerHTML = `
                <div class="rank-badge">RANK ${rank} ${rankDiffHtml}</div>
                <div class="clinic-content">
                    <h2 class="clinic-name">${clinic.クリニック名}</h2>
                    
                    <div class="score-row">
                        <span class="score-label">AI分析スコア</span>
                        <span class="score-value">${parseFloat(clinic.total_score).toFixed(2)}</span>
                    </div>

                    <div class="price-box">
                        <div class="price-item">広告最安値<span class="price-val">¥${Number(clinic.official_price).toLocaleString()}</span></div>
                        <div class="price-item">実売目安価格<span class="price-val" style="color:var(--primary-color)">¥${Number(clinic.actual_price).toLocaleString()}</span></div>
                    </div>

                    <div class="downtime-box">
                        <p class="downtime-title">⏱ ダウンタイム目安</p>
                        <p style="margin:0">${clinic.downtime_info}</p>
                    </div>

                    <div class="father-comment">
                        <span class="comment-label">🧔 お父さんの本音</span>
                        <p style="margin:0; font-size:0.95rem;">${clinic.father_comment}</p>
                    </div>

                    <div class="panda-box">
                        <img src="https://raw.githubusercontent.com/Tarikul-Islam-Anik/Animated-Fluent-Emojis/master/Emojis/Animals/Panda.png" alt="panda">
                        <p>${clinic.summary_intro}</p>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    // 起動
    loadRankings();
</script>

</body>
</html>
