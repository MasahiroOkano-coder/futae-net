<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUTAE.net | 忖度なしの二重整形AIランキング（新宿エリア）</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary-color: #ff5a5f; --secondary-color: #007bff; --bg-color: #f8f9fa; --card-bg: #ffffff; }
        body { font-family: 'Noto Sans JP', sans-serif; background-color: var(--bg-color); margin: 0; padding: 0; }
        header { background: #fff; padding: 20px; text-align: center; border-bottom: 2px solid var(--primary-color); position: sticky; top: 0; z-index: 100; }
        .update-info { font-size: 0.8rem; color: #666; margin-top: 5px; }
        .analysis-tag { display: inline-block; background: #e9ecef; padding: 2px 8px; border-radius: 10px; font-weight: bold; color: var(--secondary-color); }
        .container { max-width: 600px; margin: 20px auto; padding: 0 15px; }
        .clinic-card { background: var(--card-bg); border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 25px; overflow: hidden; border: 1px solid #eee; }
        .rank-badge { background: var(--primary-color); color: white; padding: 5px 15px; font-weight: bold; display: inline-block; border-bottom-right-radius: 15px; }
        .rank-up { font-size: 0.85rem; margin-left: 8px; font-weight: bold; }
        .clinic-content { padding: 20px; }
        .clinic-name { margin: 0 0 10px 0; font-size: 1.3rem; font-weight: bold; }
        .score-row { display: flex; align-items: baseline; margin-bottom: 15px; background: #fff0f0; padding: 10px; border-radius: 8px; }
        .score-label { font-size: 0.8rem; color: var(--primary-color); font-weight: bold; margin-right: 10px; }
        .score-value { font-size: 1.8rem; font-weight: bold; color: var(--primary-color); }
        .price-box { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .price-item { font-size: 0.8rem; color: #666; }
        .price-val { font-weight: bold; font-size: 1.1rem; display: block; color: #333; }
        .downtime-box { background: #f0f8ff; border-left: 4px solid var(--secondary-color); padding: 12px; margin-bottom: 15px; font-size: 0.9rem; }
        .downtime-title { font-weight: bold; color: var(--secondary-color); margin: 0 0 5px 0; }
        .father-comment { background: #fff9e6; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px dashed #ffd700; font-size: 0.9rem; }
        .comment-label { font-weight: bold; color: #b8860b; display: block; margin-bottom: 5px; }
        .panda-box { display: flex; align-items: center; background: #f1f3f5; padding: 10px; border-radius: 30px; }
        .panda-box img { width: 35px; height: 35px; margin-right: 10px; }
        .panda-box p { margin: 0; font-size: 0.8rem; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold; font-size: 1.5rem; color: var(--primary-color);">FUTAE.net</div>
    <div class="update-info">最終分析・データ更新日: 2026/02/26 <span class="analysis-tag">🔍 AI分析済み</span></div>
</header>

<div class="container" id="clinic-container">
    <p style="text-align: center; color:#999;">データを解析中だパン...</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

<script>
    const csvUrl = 'shinjuku.csv'; // CSVファイル名

    // 数字以外の文字（¥やカンマ）を消して数値に変換する関数
    function cleanNumber(val) {
        if (!val) return 0;
        const num = String(val).replace(/[¥,円]/g, '');
        return parseFloat(num) || 0;
    }

    async function loadRankings() {
        try {
            const response = await fetch(csvUrl);
            if (!response.ok) throw new Error('File not found');
            const csvData = await response.text();
            
            Papa.parse(csvData, {
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    renderClinics(results.data);
                }
            });
        } catch (error) {
            console.error(error);
            document.getElementById('clinic-container').innerHTML = 
                `<div style="text-align:center; padding:20px;">
                    <p>⚠️ データが読み込めないパン！</p>
                    <p style="font-size:0.8rem; color:#666;">理由: ${error.message}<br>GitHubに shinjuku.csv をアップロードしたか確認してほしいパン。</p>
                </div>`;
        }
    }

    function renderClinics(data) {
        const container = document.getElementById('clinic-container');
        
        // 1. クリーニングとフィルタリング
        const activeClinics = data
            .filter(c => {
                const status = String(c.status || '').trim().toLowerCase();
                return status === 'active';
            })
            .sort((a, b) => cleanNumber(b.total_score) - cleanNumber(a.total_score));

        if (activeClinics.length === 0) {
            container.innerHTML = '<p style="text-align:center;">表示できるクリニックがないパン...</p>';
            return;
        }

        container.innerHTML = ''; // ローディング消去

        activeClinics.forEach((clinic, index) => {
            const rank = index + 1;
            const score = cleanNumber(clinic.total_score).toFixed(2);
            const offPrice = cleanNumber(clinic.official_price).toLocaleString();
            const actPrice = cleanNumber(clinic.actual_price).toLocaleString();

            let rankDiff = '';
            if (clinic.previous_rank) {
                const diff = cleanNumber(clinic.previous_rank) - rank;
                if (diff > 0) rankDiff = `<span class="rank-up">▲${diff}</span>`;
            }

            const card = document.createElement('div');
            card.className = 'clinic-card';
            card.innerHTML = `
                <div class="rank-badge">RANK ${rank}${rankDiff}</div>
                <div class="clinic-content">
                    <h2 class="clinic-name">${clinic.クリニック名 || '名称不明'}</h2>
                    <div class="score-row">
                        <span class="score-label">AI分析スコア</span>
                        <span class="score-value">${score}</span>
                    </div>
                    <div class="price-box">
                        <div class="price-item">広告最安値<span class="price-val">¥${offPrice}</span></div>
                        <div class="price-item">実売目安価格<span class="price-val" style="color:var(--primary-color)">¥${actPrice}</span></div>
                    </div>
                    <div class="downtime-box">
                        <p class="downtime-title">⏱ ダウンタイム目安</p>
                        <p style="margin:0">${clinic.downtime_info || '調査中'}</p>
                    </div>
                    <div class="father-comment">
                        <span class="comment-label">🧔 お父さんの本音</span>
                        <p style="margin:0">${clinic.father_comment || 'コメント準備中'}</p>
                    </div>
                    <div class="panda-box">
                        <img src="https://raw.githubusercontent.com/Tarikul-Islam-Anik/Animated-Fluent-Emojis/master/Emojis/Animals/Panda.png" alt="panda">
                        <p>${clinic.summary_intro || 'ボクも応援してるパン！'}</p>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    loadRankings();
</script>

</body>
</html>
