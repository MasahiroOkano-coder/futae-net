<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* 全体の基本設定 */
        body {
            margin: 0;
            padding: 0;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            color: #333;
            background-color: #fff;
        }

        /* ヘッダー部分 */
        header {
            padding: 10px 15px;
            border-bottom: 1px solid #eee;
            position: relative;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            height: 40px; /* ロゴのサイズは適宜調整してください */
        }

        /* ご要望の「新宿クリニック一覧」 */
        .sub-header-text {
            text-align: right;
            font-family: "Times New Roman", "Shippori Mincho", serif; /* おしゃれな明朝体 */
            font-size: 11px;
            color: #888;
            margin-top: 5px;
            letter-spacing: 0.05em;
        }

        /* タブメニュー */
        .nav-tabs {
            display: flex;
            overflow-x: auto;
            padding: 10px 5px;
            gap: 8px;
            -webkit-overflow-scrolling: touch;
        }

        .tab-item {
            white-space: nowrap;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            background: #f5f5f5;
            border: 1px solid #ddd;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .tab-item.active {
            background: #d4a395; /* 画像のピンクベージュ色 */
            color: #fff;
            border-color: #d4a395;
        }

        /* クリニック一覧のグリッド（ここが修正の肝です） */
        .clinic-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2列に固定 */
            gap: 12px;
            padding: 10px;
            max-width: 1000px; /* 画面が広がりすぎないよう制限 */
            margin: 0 auto;
        }

        /* 各クリニックのカード */
        .clinic-card {
            border: 1px solid #eee;
            border-radius: 8px;
            overflow: hidden;
            background: #fff;
            display: flex;
            flex-direction: column;
        }

        .rank-badge {
            background: #c59582; /* ランクの茶色 */
            color: #fff;
            font-size: 11px;
            padding: 2px 8px;
            font-weight: bold;
        }

        .clinic-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
        }

        .clinic-info {
            padding: 8px;
        }

        .clinic-name {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 5px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .price-label {
            font-size: 10px;
            color: #999;
            margin-bottom: 2px;
        }

        .main-price-title {
            color: #d32f2f;
            font-weight: bold;
            font-size: 16px;
            margin-top: 5px;
            display: block;
        }

        .price-value {
            color: #d32f2f;
            font-weight: bold;
            font-size: 18px;
            line-height: 1.2;
        }

        /* 縦並びバグを防ぐ設定 */
        .price-container {
            white-space: nowrap;
        }
    </style>
</head>
<body>

<header>
    <div class="header-top">
        <div style="font-size: 24px;">☰</div> <img src="logo.png" alt="futae.net" class="logo"> <div style="font-size: 24px;">🐼</div> </div>
    <div class="sub-header-text">新宿クリニック一覧</div>
</header>

<div class="nav-tabs">
    <div class="tab-item active">🤖 AI判定順</div>
    <div class="tab-item">💰 コスパ順</div>
    <div class="tab-item">💉 技術力順</div>
    <div class="tab-item">👥 口コミ順</div>
</div>

<div class="clinic-grid">
    
    <div class="clinic-card">
        <div class="rank-badge">RANK 2</div>
        <img src="clinic2.jpg" alt="新宿中西クリニック" class="clinic-image">
        <div class="clinic-info">
            <div class="clinic-name">新宿中西クリニック</div>
            <div class="price-label">📢 広告最安：66,000円</div>
            <div class="price-container">
                <span class="main-price-title">💸実勢目安：</span>
                <span class="price-value">66,000円</span>
            </div>
        </div>
    </div>

    <div class="clinic-card">
        <div class="rank-badge">RANK 3</div>
        <img src="clinic3.jpg" alt="共立美容外科" class="clinic-image">
        <div class="clinic-info">
            <div class="clinic-name">共立美容外科 新宿本院</div>
            <div class="price-label">📢 広告最安：66,000円</div>
            <div class="price-container">
                <span class="main-price-title">💸実勢目安：</span>
                <span class="price-value">66,000円</span>
            </div>
        </div>
    </div>

    <div class="clinic-card">
        <div class="rank-badge">RANK 4</div>
        <img src="clinic4.jpg" alt="クリニック名" class="clinic-image">
        <div class="clinic-info">
            <div class="clinic-name">品川美容外科 新宿院</div>
            <div class="price-label">📢 広告最安：66,000円</div>
            <div class="price-container">
                <span class="main-price-title">💸実勢目安：</span>
                <span class="price-value">66,000円</span>
            </div>
        </div>
    </div>

    <div class="clinic-card">
        <div class="rank-badge">RANK 5</div>
        <img src="clinic5.jpg" alt="クリニック名" class="clinic-image">
        <div class="clinic-info">
            <div class="clinic-name">東京中央美容外科 新宿院</div>
            <div class="price-label">📢 広告最安：66,000円</div>
            <div class="price-container">
                <span class="main-price-title">💸実勢目安：</span>
                <span class="price-value">66,000円</span>
            </div>
        </div>
    </div>

</div>

</body>
</html>
