<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>futae.net - 新宿クリニック一覧</title>
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho&display=swap" rel="stylesheet">
    <style>
        /* --- 全体の基本設定 --- */
        body {
            margin: 0;
            padding: 0;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            color: #333;
            background-color: #fcfcfc;
        }

        /* --- ヘッダー --- */
        header {
            background-color: #fff;
            padding: 10px 15px 5px 15px;
            border-bottom: 1px solid #eee;
        }

        .header-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-area {
            font-size: 24px;
            font-weight: bold;
            color: #444;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .update-date {
            text-align: right;
            font-size: 10px;
            color: #ccc;
            margin-bottom: 2px;
        }

        /* ご要望：新宿クリニック一覧（右詰め・おしゃれフォント） */
        .area-label {
            text-align: right;
            font-family: 'Shippori Mincho', serif;
            font-size: 13px;
            color: #888;
            margin-top: 4px;
            letter-spacing: 0.1em;
        }

        /* --- ナビゲーション（タブ） --- */
        .nav-scroll {
            display: flex;
            overflow-x: auto;
            padding: 12px 10px;
            gap: 10px;
            background: #fff;
            -webkit-overflow-scrolling: touch;
        }

        .nav-item {
            white-space: nowrap;
            padding: 7px 14px;
            background: #f5f5f5;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            color: #666;
            border: 1px solid #ddd;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .nav-item.active {
            background: #d4a395; /* 画像のピンクベージュ */
            color: #fff;
            border-color: #d4a395;
        }

        /* --- クリニック一覧（バグ修正済みのグリッド） --- */
        .clinic-container {
            display: grid;
            /* 画面の幅に合わせて、窮屈にならないように自動調整（最低160px確保） */
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px;
            padding: 12px;
            max-width: 600px; /* スマホで見やすい幅に制限 */
            margin: 0 auto;
        }

        .clinic-card {
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .rank-badge {
            position: absolute;
            top: 0;
            left: 0;
            background: #c59582;
            color: #fff;
            font-size: 10px;
            font-weight: bold;
            padding: 2px 10px;
            border-bottom-right-radius: 8px;
            z-index: 1;
        }

        .clinic-img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            background: #eee;
        }

        .clinic-body {
            padding: 10px;
        }

        .clinic-name {
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 8px;
            line-height: 1.3;
            /* 2行以上は...で省略 */
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 2.6em; 
        }

        .price-row {
            margin-top: 5px;
        }

        .ad-price {
            font-size: 11px;
            color: #999;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        /* 縦並びバグを絶対に防ぐ設定 */
        .actual-price-box {
            margin-top: 8px;
            display: block;
            white-space: nowrap; /* 改行させない */
        }

        .price-label-red {
            color: #e53935;
            font-weight: bold;
            font-size: 15px;
            letter-spacing: -0.05em;
        }

        .price-value-red {
            color: #e53935;
            font-size: 19px;
            font-weight: 900;
        }

        /* パンダアイコン用 */
        .panda-icon {
            font-size: 30px;
        }
    </style>
</head>
<body>

<header>
    <div class="update-date">03/03更新</div>
    <div class="header-main">
        <div style="font-size: 24px; color: #d4a395;">☰</div>
        <div class="logo-area">
            <span style="font-style: italic;">futae.net</span>
        </div>
        <div class="panda-icon">🐼</div>

<nav class="nav-scroll">

</nav>

            <div class="actual-price-box">
                <span class="price-label-red">💸実勢目安:</span><br>
                <span class="price-value-red">66,000円</span>

    <div class="clinic-card">

        <div class="clinic-body">

            <div class="ad-price">📢 広告最安: 66,000円</div>
            <div class="actual-price-box">

                <span class="price-value-red">66,000円</span>

    <div class="clinic-card">
        <div class="rank-badge">RANK 4</div>

        <div class="clinic-body">
            <div class="clinic-name">品川美容外科 新宿院</div>

            <div class="ad-price">📢 広告最安: 66,000円</div>
            <div class="actual-price-box">
                <span class="price-label-red">💸実勢目安:</span><br>
                <span class="price-value-red">66,000円</span>
            </div>
        </div>
    </div>

</main>

</body>
</html>
