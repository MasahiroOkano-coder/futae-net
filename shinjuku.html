<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>futae.net | 新宿二重整形AI診断 V25.3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Shippori+Mincho&display=swap" rel="stylesheet">
    <style>
        :root { --rose-gold: #C19281; --bg: #f8f9fa; --accent: #d63031; --gold: #d4af37; --pink-bg: #fff5f5; }
        body { font-family: "Noto Sans JP", sans-serif; background: var(--bg); margin: 0; padding: 0; line-height: 1.4; color: #333; overflow-x: hidden; }
        
        /* --- ヘッダー --- */
        header { background: #fff; height: 100px; display: flex; flex-direction: column; justify-content: center; padding: 0 15px; position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid #eee; }
        .header-main { display: flex; align-items: center; justify-content: space-between; width: 100%; }
        .header-logo { height: 42px; cursor: pointer; }
        .menu-trigger { font-size: 32px; cursor: pointer; color: var(--rose-gold); width: 65px; }
        .header-right { text-align: right; width: 80px; cursor: pointer; }
        .header-update-mini { font-size: 8px; color: #bbb; margin-bottom: -4px; font-weight: bold; }
        .header-panda { font-size: 32px; }
        .area-subtitle { text-align: right; font-family: 'Shippori Mincho', serif; font-size: 11px; color: #999; margin-top: 2px; }

        /* --- サイドメニュー --- */
        #side-menu { position: fixed; top: 0; left: -300px; width: 300px; height: 100%; background: white; z-index: 5000; transition: 0.4s; box-shadow: 5px 0 15px rgba(0,0,0,0.1); overflow-y: auto; }
        #side-menu.open { left: 0; }
        #menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 4500; display: none; }
        .menu-header { padding: 40px 20px; background: var(--rose-gold); color: white; text-align: center; font-weight: bold; font-size: 1.4em; }
        .menu-item { padding: 18px 20px; border-bottom: 1px solid #eee; font-weight: bold; cursor: pointer; font-size: 0.95em; color: #444; }
        .menu-sub-title { background: #f9f9f9; padding: 10px 20px; font-size: 0.75em; color: #999; font-weight: bold; }

        /* --- メインコンテンツ --- */
        .sort-container { background: #fff; padding: 10px 5px; display: flex; gap: 8px; overflow-x: auto; position: sticky; top: 100px; z-index: 900; border-bottom: 1px solid #eee; }
        .sort-btn { flex: 0 0 auto; background: #fff; border: 1px solid #eee; padding: 8px 14px; border-radius: 20px; font-size: 0.75em; font-weight: bold; cursor: pointer; white-space: nowrap; }
        .sort-btn.active { background: var(--rose-gold); color: white; border-color: var(--rose-gold); }
        
        main { padding: 10px; max-width: 550px; margin: 0 auto; }
        .card { background: #fff; border-radius: 12px; margin-bottom: 15px; position: relative; box-shadow: 0 2px 8px rgba(0,0,0,0.05); overflow: hidden; cursor: pointer; border: 1px solid #eee; }
        .rank-badge { position: absolute; top: 0; left: 0; background: var(--rose-gold); color: #fff; padding: 4px 12px; font-size: 0.72em; font-weight: bold; border-radius: 0 0 10px 0; z-index: 10; }
        .rank-grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .img-container { height: 180px; background: #eee; overflow: hidden; }
        .card-grid .img-container { height: 125px; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        .card-body { padding: 10px; }
        .clinic-name { font-weight: bold; font-size: 1.0em; margin-bottom: 4px; color: #000; min-height: 2.8em; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .price-actual { font-size: 1.1em; color: var(--accent); font-weight: 900; }
        .stat-score { font-size: 0.9em; color: var(--rose-gold); font-weight: bold; }

        /* --- モーダル (詳細表示) --- */
        #detail-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 6000; display: none; overflow-y: auto; }
        .modal-header { position: sticky; top: 0; padding: 10px; display: flex; justify-content: flex-end; z-index: 7000; background: rgba(255,255,255,0.9); }
        .close-btn { background: #666; color: #fff; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        .db-section { padding: 15px 20px; border-bottom: 4px solid #f5f5f5; }
        .db-section:last-child { border-bottom: none; }
        .db-label { font-size: 0.8em; color: var(--rose-gold); font-weight: bold; margin-bottom: 5px; display: block; border-left: 4px solid var(--rose-gold); padding-left: 8px; }
        
        /* コンパクト化調整 */
        .modal-title { font-size: 1.3em; font-weight: bold; margin: 0; }
        .modal-score-box { background: var(--pink-bg); padding: 10px; border-radius: 8px; text-align: center; margin-top: 5px; }
        .intro-text { font-size: 0.9em; line-height: 1.6; color: #555; background: #fff; padding: 5px 0; }
        .papa-box { background: #fef9f0; border: 1px solid #fae1b6; padding: 15px; border-radius: 12px; font-size: 0.9em; }
        
        .review-box { background: #f9f9f9; padding: 12px; border-radius: 8px; font-size: 0.85em; max-height: 300px; overflow-y: auto; }
        .review-item { margin-bottom: 8px; border-bottom: 1px dashed #ddd; padding-bottom: 5px; line-height: 1.5; }
        .review-item:last-child { border-bottom: none; margin-bottom: 0; }

        /* その他 V25.1継承 */
        .manga-img { max-width: 100%; border-radius: 10px; margin-bottom: 10px; }
        #floating-panda { position: fixed; bottom: 20px; right: 20px; z-index: 4000; visibility: hidden; }
        #floating-panda.show { visibility: visible; }
        footer { background: #444; color: #fff; padding: 30px 15px; text-align: center; font-size: 0.75em; }
    </style>
</head>
<body>
    <div id="menu-overlay" onclick="closeMenu()"></div>
    <nav id="side-menu">
        <div class="menu-header">futae.net</div>
        <div class="menu-item" onclick="location.href='index.html'">🏠 トップページ</div>
        <div class="menu-item" onclick="openInfo('story')">🧭 Futae.netの正義 (マンガ)</div>
        <div class="menu-item" onclick="openInfo('money')">💰 知っておきたい「お金」のハナシ</div>
        <div class="menu-item" onclick="openInfo('knowledge')">💉 二重整形の基本知識</div>
        <div class="menu-item" onclick="openInfo('logic')">🤖 AI判定の仕組み</div>
        <div class="menu-sub-title">エリア選択</div>
        <div class="menu-item" onclick="location.reload()">📍 新宿（公開中）</div>
    </nav>

    <header>
        <div class="header-main">
            <div class="menu-trigger" onclick="openMenu()">☰</div>
            <img src="futae_net_final_logo.png" alt="logo" class="header-logo" onclick="location.href='index.html'">
            <div class="header-right" onclick="togglePandaShow()">
                <div class="header-update-mini" id="header-date">03/03更新</div>
                <div class="header-panda">🐼</div>
            </div>
        </div>
        <div class="area-subtitle">新宿クリニック一覧</div>
    </header>

    <div class="sort-container">
        <div class="sort-btn active" id="sort-ai" onclick="sort('ai')">🤖 AI判定順</div>
        <div class="sort-btn" id="sort-price" onclick="sort('price')">💰 コスパ順</div>
        <div class="sort-btn" id="sort-tech" onclick="sort('tech')">💉 技術力順</div>
        <div class="sort-btn" id="sort-review" onclick="sort('review')">👥 クチコミ数順</div>
    </div>

    <main id="main-content">
        <div id="loading-msg" style="text-align:center; padding-top:100px;">🐼 分析中だパン...</div>
        <div id="rank-1-area"></div>
        <div id="rank-grid-area" class="rank-grid-container"></div>
        <div id="rank-10-area"></div>
        <div id="rank-list-area"></div>
    </main>

    <div id="detail-modal">
        <div class="modal-header"><div class="close-btn" onclick="closeModal()">✕</div></div>
        <div id="modal-body"></div>
    </div>

    <div id="floating-panda" onclick="speakWisdom()">
        <div id="wisdom-bubble" style="display:none; position:absolute; bottom:80px; right:0; width:200px; background:#fff; border:2px solid var(--rose-gold); padding:10px; border-radius:15px; font-size:0.8em;"></div>
        <div style="font-size: 60px; cursor:pointer;">🐼</div>
    </div>

    <footer>最終更新日: <span id="footer-date">2026/03/03</span><br>&copy; 2026 futae.net</footer>

    <script>
        const spreadsheetId = '1WE5TRSmMxPFM5q5LSWyvNC9S8glgBKfyofIK-ZDncsY';
        const clinicCsvUrl = `https://docs.google.com/spreadsheets/d/${spreadsheetId}/export?format=csv&gid=0`;
        const wisdomCsvUrl = `https://docs.google.com/spreadsheets/d/e/2PACX-1vQmTgCOB0gT-HGoZEIvTHCJyZsLd_t7thkzzhK1-ocKZQ-mhVCW96Qw_9nuQvQaxl_qrf0A2tRDbeIG/pub?gid=139261368&single=true&output=csv`;
        
        let globalData = []; let wisdomData = [];

        function cleanNum(v) { return parseFloat(String(v || '0').replace(/[^\d.]/g, '')) || 0; }

        async function init() {
            await loadClinics();
            await loadWisdom();
            const now = new Date();
            document.getElementById('footer-date').innerText = now.getFullYear() + "/" + (now.getMonth()+1) + "/" + now.getDate();
        }

        async function loadClinics() {
            const res = await fetch(clinicCsvUrl);
            const txt = await res.text();
            Papa.parse(txt, { header: true, skipEmptyLines: true, complete: (r) => {
                globalData = r.data.filter(c => String(c.status).toLowerCase() === 'active');
                document.getElementById('loading-msg').style.display='none';
                sort('ai');
            }});
        }

        async function loadWisdom() {
            const res = await fetch(wisdomCsvUrl);
            const txt = await res.text();
            Papa.parse(txt, { header: true, complete: (r) => {
                wisdomData = r.data;
                document.getElementById('floating-panda').classList.add('show');
            }});
        }

        function sort(type) {
            document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('sort-' + type).classList.add('active');
            globalData.sort((a, b) => {
                if (type === 'ai') return cleanNum(b.total_score) - cleanNum(a.total_score);
                if (type === 'price') return cleanNum(a.actual_price) - cleanNum(b.actual_price);
                if (type === 'tech') return cleanNum(b.score_tech) - cleanNum(a.score_tech);
                if (type === 'review') return cleanNum(b.review_total_count) - cleanNum(a.review_total_count);
                return 0;
            });
            render();
        }

        function createCardHtml(item, rank, type) {
            const actP = cleanNum(item.actual_price).toLocaleString();
            const score = cleanNum(item.total_score).toFixed(2);
            if (type === 'list') {
                return `<div class="card" style="display:flex; align-items:center; padding:10px;" onclick="openModalByData('${item['クリニック名']}')"><div style="width:30px; font-weight:bold;">${rank}</div><div style="flex:1;">${item['クリニック名']}</div><div style="text-align:right;"><div class="price-actual" style="font-size:0.9em;">¥${actP}</div></div></div>`;
            }
            return `<div class="card ${type==='grid'?'card-grid':''}" onclick="openModalByData('${item['クリニック名']}')">
                <div class="rank-badge">RANK ${rank}</div>
                <div class="img-container"><img src="${item.photo_url || ''}"></div>
                <div class="card-body">
                    <div class="clinic-name">${item['クリニック名']}</div>
                    <div style="display:flex; justify-content:space-between; align-items:flex-end;">
                        <div class="price-actual">¥${actP}</div>
                        <div class="stat-score">AI ${score}</div>
                    </div>
                </div>
            </div>`;
        }

        function render() {
            let r1='', rGrid='', r10='', rList='';
            globalData.forEach((item, i) => {
                const r = i+1;
                if(r===1) r1 = createCardHtml(item, r, 'full');
                else if(r<=9) rGrid += createCardHtml(item, r, 'grid');
                else if(r===10) r10 = createCardHtml(item, r, 'full');
                else rList += createCardHtml(item, r, 'list');
            });
            document.getElementById('rank-1-area').innerHTML = r1;
            document.getElementById('rank-grid-area').innerHTML = rGrid;
            document.getElementById('rank-10-area').innerHTML = r10;
            document.getElementById('rank-list-area').innerHTML = rList;
        }

        function openModalByData(name) {
            const item = globalData.find(d => d['クリニック名'] === name);
            const score = cleanNum(item.total_score).toFixed(2);
            
            // クチコミの空白行を排除
            const formatReviews = (str, tag) => {
                if(!str) return "データ収集中だパン";
                return str.split('\n').filter(line => line.trim() !== "").map(line => `<div class="review-item"><span style="color:${tag==='good'?'#2ecc71':'#e74c3c'}">●</span> ${line}</div>`).join('');
            };

            const modalBody = document.getElementById('modal-body');
            modalBody.innerHTML = `
                <div style="height:200px;"><img src="${item.photo_url}" style="width:100%; height:100%; object-fit:cover;"></div>
                
                <div class="db-section" style="padding-bottom:10px;">
                    <h2 class="modal-title">${item['クリニック名']}</h2>
                    <div class="modal-score-box">
                        <span style="font-size:0.8em; color:var(--rose-gold); font-weight:bold;">AI総合判定</span><br>
                        <span style="font-size:1.8em; font-weight:900; color:var(--rose-gold);">${score}</span>
                    </div>
                </div>

                <div class="db-section">
                    <div class="intro-text">${item.summary_intro || ''}</div>
                </div>

                <div class="db-section"><canvas id="radarChart" style="max-height:200px;"></canvas></div>

                <div class="db-section">
                    <span class="db-label">📋 詳細データ</span>
                    <table style="width:100%; font-size:0.85em; border-collapse:collapse;">
                        <tr style="border-bottom:1px solid #eee;"><td style="padding:5px 0;">📢 広告最安</td><td style="text-align:right;">¥${cleanNum(item.official_price).toLocaleString()}</td></tr>
                        <tr style="border-bottom:1px solid #eee;"><td style="padding:5px 0; font-weight:bold;">💸 実勢目安</td><td style="text-align:right; color:var(--accent); font-weight:bold;">¥${cleanNum(item.actual_price).toLocaleString()}</td></tr>
                        <tr style="border-bottom:1px solid #eee;"><td style="padding:5px 0;">⚖️ 価格ギャップ</td><td style="text-align:right;">¥${cleanNum(item.gap_score).toLocaleString()}</td></tr>
                        <tr><td style="padding:5px 0;">⏱ ダウンタイム</td><td style="text-align:right;">${item.downtime_info || '3~7日'}</td></tr>
                    </table>
                </div>

                <div class="db-section" style="text-align:center;">
                    <a href="${item.official_url}" target="_blank" style="display:block; background:var(--rose-gold); color:#fff; padding:15px; border-radius:30px; text-decoration:none; font-weight:bold; font-size:1em;">公式サイトをチェック</a>
                </div>

                <div class="db-section">
                    <span class="db-label">🧔 パパの本音</span>
                    <div class="papa-box">「${item.father_comment || 'いいクリニックだね。'}」</div>
                </div>

                <div class="db-section">
                    <div class="intro-text" style="font-weight:bold; color:var(--rose-gold);">${item.review_summary || ''}</div>
                </div>

                <div class="db-section">
                    <span class="db-label">👥 現場のリアル</span>
                    <div class="review-box">
                        <div style="font-weight:bold; margin-bottom:5px; color:#2ecc71;">[良い点]</div>
                        ${formatReviews(item.reviews_good, 'good')}
                        <div style="font-weight:bold; margin-top:10px; margin-bottom:5px; color:#e74c3c;">[気になる点]</div>
                        ${formatReviews(item.reviews_bad, 'bad')}
                    </div>
                </div>
            `;
            
            document.getElementById('detail-modal').style.display='block';
            setTimeout(() => {
                new Chart(document.getElementById('radarChart'), {
                    type: 'radar',
                    data: {
                        labels: ['信頼','安全','技術','コスパ'],
                        datasets: [{ data: [cleanNum(item.score_trust), cleanNum(item.score_safety), cleanNum(item.score_tech), cleanNum(item.score_cost)], backgroundColor: 'rgba(193,146,129,0.2)', borderColor: 'var(--rose-gold)', borderWidth: 2 }]
                    },
                    options: { scales: { r: { min: 0, max: 5, ticks: { display: false } } }, plugins: { legend: { display: false } } }
                });
            }, 100);
        }

        function openInfo(t) {
            closeMenu();
            const b = document.getElementById('modal-body');
            if(t==='story') b.innerHTML = `<div style="padding:20px;"><img src="story1.jpg" class="manga-img"><img src="story2.jpg" class="manga-img"></div>`;
            else if(t==='money') b.innerHTML = `<div style="padding:20px;"><h2>💰 お金のハナシ</h2><p>自由診療だからこそ、正しい比較が必要です。</p></div>`;
            else if(t==='knowledge') b.innerHTML = `<div style="padding:20px;"><h2>💉 基本知識</h2><p>埋没法と切開法の違いを知りましょう。</p></div>`;
            else if(t==='logic') b.innerHTML = `<div style="padding:20px;"><h2>🤖 AI判定の仕組み</h2><p>独自のアルゴリズムで、広告に騙されない順位を出しています。</p></div>`;
            document.getElementById('detail-modal').style.display='block';
        }

        function closeModal() { document.getElementById('detail-modal').style.display='none'; }
        function openMenu() { document.getElementById('side-menu').classList.add('open'); document.getElementById('menu-overlay').style.display='block'; }
        function closeMenu() { document.getElementById('side-menu').classList.remove('open'); document.getElementById('menu-overlay').style.display='none'; }
        function togglePandaShow() { document.getElementById('floating-panda').classList.toggle('show'); }
        function speakWisdom() {
            if(wisdomData.length===0) return;
            const s = wisdomData[Math.floor(Math.random()*wisdomData.length)];
            const b = document.getElementById('wisdom-bubble');
            b.innerText = s.Answer; b.style.display = 'block';
            setTimeout(()=> b.style.display='none', 5000);
        }

        init();
    </script>
</body>
</html>
