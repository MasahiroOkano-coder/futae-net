        .form-title { text-align: center; color: var(--rose-gold); font-weight: bold; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.85em; font-weight: bold; margin-bottom: 5px; color: #666; }
        .form-control { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1em; box-sizing: border-box; }

        .modal-header { position: sticky; top: 0; padding: 15px; display: flex; justify-content: flex-end; z-index: 7000; background: #fff; }
        .close-btn { background: #666; color: #fff; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .db-section { padding: 25px 20px; border-bottom: 8px solid #f5f5f5; }
        .db-label { font-size: 0.85em; color: var(--rose-gold); font-weight: bold; margin-bottom: 12px; display: block; border-left: 5px solid var(--rose-gold); padding-left: 10px; }
        .review-box { background: #f9f9f9; padding: 15px; border-radius: 12px; border: 1px solid #eee; margin-bottom: 15px; font-size: 0.92em; line-height: 1.6; }
        .manga-container { width: 100%; text-align: center; padding: 0 15px; box-sizing: border-box; }
        .manga-img { max-width: 100%; height: auto; border-radius: 10px; margin-bottom: 15px; display: block; margin-left: auto; margin-right: auto; }
        .father-msg-box { background: var(--pink-bg); padding: 25px; border-radius: 15px; border: 2px dashed var(--rose-gold); text-align: left; font-size: 0.92em; line-height: 1.8; margin-top: 20px; }
        #floating-panda { position: fixed; bottom: -150px; right: 20px; z-index: 4000; transition: 0.5s; visibility: hidden; }
        #floating-panda.show { bottom: 20px; visibility: visible; }
        .wisdom-bubble { position: absolute; bottom: 100px; right: 0; width: 240px; background: #fff; border: 3px solid var(--rose-gold); padding: 15px; border-radius: 20px; font-size: 0.85em; font-weight: bold; box-shadow: 0 8px 25px rgba(0,0,0,0.15); display: none; line-height: 1.6; }
        .wisdom-bubble.active { display: block; }
        footer { background: #444; color: #fff; padding: 40px 20px; text-align: center; font-size: 0.8em; }
    </style>
</head>
<body>

    <section id="contact-section">

    <div id="floating-panda"><div class="wisdom-bubble" id="wisdom-bubble"><span id="wisdom-cat" style="font-size:0.7em; color:var(--rose-gold); display:block; border-bottom:1px solid #eee; margin-bottom:5px;">Panda Wisdom</span><span id="wisdom-text"></span></div><div style="font-size: 80px; cursor:pointer;" onclick="speakWisdom()">🐼</div></div>

    <script>
        const spreadsheetId = '1WE5TRSmMxPFM5q5LSWyvNC9S8glgBKfyofIK-ZDncsY';
        const clinicCsvUrl = `https://docs.google.com/spreadsheets/d/${spreadsheetId}/export?format=csv&gid=0`;
        const wisdomCsvUrl = `https://docs.google.com/spreadsheets/d/e/2PACX-1vQmTgCOB0gT-HGoZEIvTHCJyZsLd_t7thkzzhK1-ocKZQ-mhVCW96Qw_9nuQvQaxl_qrf0A2tRDbeIG/pub?gid=139261368&single=true&output=csv`; 
        let globalData = []; let wisdomData = [];
        function cleanNum(v) { if (!v) return 0; return parseFloat(String(v).replace(/[^\d.]/g, '')) || 0; }
        async function init() { await loadClinics(); await loadWisdom(); }
        async function loadClinics() {
            try {
                const res = await fetch(clinicCsvUrl); const txt = await res.text();
                Papa.parse(txt, { header: true, skipEmptyLines: true, transformHeader: h => h.trim(), complete: function(r) {
                    globalData = r.data.filter(c => String(c.status || '').trim().toLowerCase() === 'active' && c['クリニック名']);
                    document.getElementById('loading-msg').style.display = 'none'; sort('ai');
                }});
            } catch (e) { console.error(e); }
        }
        async function loadWisdom() {
            try {
                const res = await fetch(wisdomCsvUrl); const txt = await res.text();
                Papa.parse(txt, { header: true, skipEmptyLines: true, complete: function(r) {
                    wisdomData = r.data; setTimeout(() => { document.getElementById('floating-panda').classList.add('show'); }, 1200);
                }});
            } catch (e) { console.error(e); }
        }
        function speakWisdom() {
            if (wisdomData.length === 0) return;
            const pool = []; wisdomData.forEach(item => { let p = parseInt(item.Priority) || 1; for (let i = 0; i < p; i++) pool.push(item); });
            const s = pool[Math.floor(Math.random() * pool.length)]; showPandaBubble(s.Category, s.Answer);
        }
        function showPandaBubble(cat, msg) {
            const b = document.getElementById('wisdom-bubble'); document.getElementById('wisdom-cat').innerText = cat; document.getElementById('wisdom-text').innerText = msg;
            b.classList.add('active'); setTimeout(() => { b.classList.remove('active'); }, 12000);
        }
        function sort(type) {
            document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('sort-' + type).classList.add('active');
            if (type === 'review') showPandaBubble("⚠️ 警告", "クチコミ数＝広告費だパン！騙されるなパン！");
            globalData.sort((a, b) => {
                const sA = cleanNum(a.total_score), sB = cleanNum(b.total_score);
                if (type === 'ai') return sB - sA;
                if (type === 'price') return cleanNum(a.actual_price) - cleanNum(b.actual_price) || sB - sA;
                if (type === 'tech') return cleanNum(b.score_tech) - cleanNum(a.score_tech) || sB - sA;
                if (type === 'review') return cleanNum(b.review_total_count) - cleanNum(a.review_total_count) || sB - sA;
                return 0;
            }); render();
        }
        function createCardHtml(item, rank, type) {
            const score = cleanNum(item.total_score).toFixed(2), rCount = cleanNum(item.review_total_count).toLocaleString(), actP = cleanNum(item.actual_price).toLocaleString(), offP = cleanNum(item.official_price).toLocaleString();
            if (type === 'full') {
                return `<div class="card ${rank===1?'card-rank1':'card-rank10'}" onclick="openModalByData('${item['クリニック名']}')"><div class="rank-badge ${rank===1?'badge-gold':''}">RANK ${rank}</div><div class="img-container"><img src="${item.photo_url || ''}"></div><div class="card-body"><h2 class="clinic-name">${item['クリニック名']}</h2><div class="info-row"><div class="price-col"><div class="price-official">📢 広告最安: ${offP}円</div><div class="price-actual">💸 実勢目安: ${actP}円</div></div><div class="stats-col"><span class="stat-rev">${rCount}件のクチコミ</span><span class="stat-score">AI判定 ${score}</span></div></div></div></div>`;
            } else if (type === 'grid') {
                return `<div class="card card-grid" onclick="openModalByData('${item['クリニック名']}')"><div class="rank-badge">RANK ${rank}</div><div class="img-container"><img src="${item.photo_url || ''}"></div><div class="card-body"><div class="clinic-name" style="font-size:0.88em; min-height:2.6em;">${item['クリニック名']}</div><div class="info-row"><div class="price-col"><div class="price-official" style="font-size:0.58em; color:#bbb;">📢 ${offP}円</div><div class="price-actual" style="font-size:0.95em;">💸 ${actP}円</div></div><div class="stats-col"><span class="stat-score" style="font-size:0.75em;">AI ${score}</span></div></div></div></div>`;
            } else {
                return `<div class="card card-compact" onclick="openModalByData('${item['クリニック名']}')"><div class="compact-rank">${rank}</div><div class="compact-info"><div class="compact-name">${item['クリニック名']}</div></div><div class="compact-right"><div class="price-actual" style="font-size:0.95em;">💸 ${actP}円</div><div class="stat-score" style="font-size:0.7em;">AI ${score}</div></div></div>`;
            }
        }
        function render() {
            let r1='', rGrid='', r10='', rList='';
            globalData.forEach((item, i) => { const r=i+1; if(r===1) r1=createCardHtml(item,r,'full'); else if(r<=9) rGrid+=createCardHtml(item,r,'grid'); else if(r===10) r10=createCardHtml(item,r,'full'); else rList+=createCardHtml(item,r,'list'); });
            document.getElementById('rank-1-area').innerHTML=r1; document.getElementById('rank-grid-area').innerHTML=rGrid; document.getElementById('rank-10-area').innerHTML=r10; document.getElementById('rank-list-area').innerHTML=rList;
        }
        function openModalByData(name) {
            const item = globalData.find(d => d['クリニック名'] === name); const score = cleanNum(item.total_score).toFixed(2);
            document.getElementById('modal-body').innerHTML = `
                <div style="height:220px;"><img src="${item.photo_url}" style="width:100%; height:100%; object-fit:cover;"></div>
                <div class="db-section"><h2>${item['クリニック名']}</h2><p style="color:var(--rose-gold); font-weight:bold; font-size:1.4em; margin:8px 0;">AI総合判定 ${score}</p></div>
                <div class="db-section"><span class="db-label">👥 現場のリアル</span><div class="review-box">${item.review_summary || '分析中'}</div></div>
                <div class="db-section"><canvas id="radarChart"></canvas></div>
                <div class="db-section"><span class="db-label">🧔 お父さんの本音</span><p style="font-size:0.95em; line-height:1.6;">🧔 ${item.father_comment || ''}</p></div>
                <div class="db-section"><span class="db-label">📋 詳細</span>
                    <table style="width:100%; font-size:0.9em; line-height:2.0;">
                        <tr><th style="text-align:left;">📢 広告最安</th><td style="text-align:right;">¥${cleanNum(item.official_price).toLocaleString()}</td></tr>
                        <tr><th style="text-align:left;">💸 実勢目安</th><td style="text-align:right; color:var(--accent);">¥${cleanNum(item.actual_price).toLocaleString()}</td></tr>
                        <tr><th style="text-align:left;">⚖️ 価格乖離度</th><td style="text-align:right;">¥${cleanNum(item.gap_score).toLocaleString()}</td></tr>
                        <tr><th style="text-align:left;">⏱ ダウンタイム</th><td style="text-align:right;">${item.downtime_info || '3〜7日'}</td></tr>
                    </table>
                </div>
                <div style="padding:40px 20px;"><a href="${item.official_url}" target="_blank" style="display:block; background:var(--rose-gold); color:#fff; text-align:center; padding:18px; border-radius:35px; text-decoration:none; font-weight:bold;">公式サイト</a></div>`;
            document.getElementById('detail-modal').style.display='block'; setTimeout(() => initRadar(item), 150);
        }
        function initRadar(item) { new Chart(document.getElementById('radarChart'), { type:'radar', data:{ labels:['信頼性','安全性','技術力','コスパ'], datasets:[{ data:[cleanNum(item.score_trust), cleanNum(item.score_safety), cleanNum(item.score_tech), cleanNum(item.score_cost)], backgroundColor:'rgba(193,146,129,0.2)', borderColor:'var(--rose-gold)', borderWidth:2 }] }, options:{ scales:{ r:{ min:0, max:5, ticks:{display:false} } }, plugins:{ legend:{display:false} } } }); }
        
        function openInfo(t) {
            const b = document.getElementById('modal-body'); closeMenu();
            if(t==='story') {
                b.innerHTML = `<div class="manga-container" style="padding:20px 0;"><h2 style="color:var(--rose-gold);">🧭 Futae.netの正義</h2><img src="story1.jpg" class="manga-img"><img src="story2.jpg" class="manga-img"><img src="story3.jpg" class="manga-img"><img src="story4.jpg" class="manga-img"><div class="father-msg-box">「次女の二重への思いを大切に、それに向け頑張ったアルバイト代を正しいクリニックで使ってほしい」<br><br>父親のそんな思いからAIを味方にして作ったのが、この <strong>『Futae.net』</strong> です。<br>このサイトは24時間AIを動かし続けるためのサーバー代として、一部アフィリエイトを利用しています。が、安心してください。それとこれとは別、このサイトの使命は忖度なしの順位をつけること。<br>なけなしのアルバイト代でプチ整形にチャレンジしたいそんな君たちへ、自信をもってオススメします。<br><br>「ここが良かった」や「こういう機能がほしい」、そんな要望があればぜひ問い合わせからお気軽にご連絡ください。</div></div>`;
            } else if(t==='knowledge') {
